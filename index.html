<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SHOW TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

header {
    background-color: #111;
    padding: 10px;
    text-align: center;
}

header h1 {
    margin: 5px 0;
    color: orange;
}

#searchInput {
    width: 90%;
    padding: 8px;
    border-radius: 6px;
    border: none;
    margin-top: 8px;
}

.container {
    display: flex;
    height: calc(100vh - 120px);
}

.channel-list {
    width: 30%;
    background-color: #1a1a1a;
    overflow-y: auto;
    padding: 10px;
}

.channel {
    padding: 10px;
    margin-bottom: 8px;
    background-color: #222;
    cursor: pointer;
    border-radius: 6px;
}

.channel:hover {
    background-color: orange;
    color: black;
}

.player {
    width: 70%;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: black;
}

video {
    width: 95%;
    height: 95%;
}
</style>
</head>

<body>

<header>
    <h1>SHOW TV</h1>
    <input type="text" id="searchInput" placeholder="Buscar canal...">
</header>

<div class="container">
    <div class="channel-list" id="channelList">Cargando canales...</div>
    <div class="player">
        <video id="video" controls autoplay></video>
    </div>
</div>

<script>
const m3uUrl = "showtv.m3u";
const list = document.getElementById("channelList");
const searchInput = document.getElementById("searchInput");
let allChannels = [];

async function loadM3U(url) {
    list.innerHTML = "Cargando canales...";

    const res = await fetch(url);
    const text = await res.text();
    const lines = text.split("\n");

    allChannels = [];

    for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith("#EXTINF")) {
            const name = lines[i].split(",")[1]?.trim();
            const streamUrl = lines[i + 1]?.trim();

            if (!name || !streamUrl) continue;

            allChannels.push({ name, url: streamUrl });
        }
    }

    renderChannels(allChannels);
}

function renderChannels(arr) {
    list.innerHTML = "";

    if (arr.length === 0) {
        list.innerHTML = "No se encontraron canales.";
        return;
    }

    arr.forEach(c => {
        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = c.name;
        div.onclick = () => playStream(c.url);
        list.appendChild(div);
    });
}

function playStream(url) {
    const video = document.getElementById("video");

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase();
    const filtered = allChannels.filter(c =>
        c.name.toLowerCase().includes(q)
    );
    renderChannels(filtered);
});

loadM3U(m3uUrl);
</script>

</body>
</html>
