<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHOW TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

header {
    background-color: #111;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: orange;
}

.search-box {
    padding: 10px;
    background: #1a1a1a;
}

.search-box input {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
}

.container {
    display: flex;
    height: calc(100vh - 120px);
}

.channel-list {
    width: 30%;
    background-color: #1a1a1a;
    overflow-y: auto;
    padding: 10px;
}

.channel {
    padding: 10px;
    margin-bottom: 6px;
    background-color: #222;
    cursor: pointer;
    border-radius: 6px;
}

.channel:hover {
    background-color: orange;
    color: black;
}

.player {
    width: 70%;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: black;
}

video {
    width: 95%;
    height: 95%;
    background: black;
}

@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }
    .channel-list {
        width: 100%;
        height: 40%;
    }
    .player {
        width: 100%;
        height: 60%;
    }
}
</style>
</head>

<body>

<header>SHOW TV</header>

<div class="search-box">
    <input type="text" id="search" placeholder="Buscar canal...">
</div>

<div class="container">
    <div class="channel-list" id="channelList">
        Verificando canales...
    </div>

    <div class="player">
        <video id="video" controls autoplay></video>
    </div>
</div>

<script>
const m3uUrl = "https://raw.githubusercontent.com/edersalvadorlm-png/showtv/main/showtv.m3u";

const list = document.getElementById("channelList");
const video = document.getElementById("video");
const searchInput = document.getElementById("search");

let hls;
let workingChannels = [];

async function loadChannels() {

    try {
        const response = await fetch(m3uUrl);
        const text = await response.text();
        const lines = text.split("\n");

        list.innerHTML = "Verificando canales...";
        workingChannels = [];

        for (let i = 0; i < lines.length; i++) {

            if (lines[i].startsWith("#EXTINF")) {

                const name = lines[i].split(",")[1];
                const url = lines[i + 1]?.trim();

                if (!url || !url.startsWith("http")) continue;

                const isWorking = await testStream(url);

                if (isWorking) {
                    workingChannels.push({ name, url });
                    renderChannels(workingChannels);
                }
            }
        }

        if (workingChannels.length === 0) {
            list.innerHTML = "No se encontraron canales activos.";
        }

    } catch (error) {
        list.innerHTML = "Error cargando lista.";
        console.error(error);
    }
}

function testStream(url) {
    return new Promise(resolve => {

        const tempVideo = document.createElement("video");
        tempVideo.muted = true;
        tempVideo.src = url;

        let timeout = setTimeout(() => {
            tempVideo.src = "";
            resolve(false);
        }, 7000);

        tempVideo.onloadeddata = () => {
            clearTimeout(timeout);
            tempVideo.src = "";
            resolve(true);
        };

        tempVideo.onerror = () => {
            clearTimeout(timeout);
            tempVideo.src = "";
            resolve(false);
        };
    });
}

function renderChannels(channels) {
    list.innerHTML = "";

    channels.forEach(channel => {
        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = channel.name;
        div.onclick = () => playStream(channel.url);
        list.appendChild(div);
    });
}

function playStream(url) {

    if (hls) {
        hls.destroy();
        hls = null;
    }

    if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play();
        });
    } else {
        video.src = url;
        video.play();
    }
}

searchInput.addEventListener("input", function () {
    const value = this.value.toLowerCase();
    const filtered = workingChannels.filter(c =>
        c.name.toLowerCase().includes(value)
    );
    renderChannels(filtered);
});

loadChannels();
</script>

</body>
</html>
