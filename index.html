<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SHOW TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

header {
    background-color: #111;
    padding: 10px;
    text-align: center;
}

header h1 {
    margin: 5px 0;
    color: orange;
}

#searchInput {
    width: 90%;
    padding: 8px;
    border-radius: 6px;
    border: none;
    margin-top: 8px;
}

.container {
    display: flex;
    height: calc(100vh - 120px);
}

.channel-list {
    width: 30%;
    background-color: #1a1a1a;
    overflow-y: auto;
    padding: 10px;
}

.country {
    background-color: #333;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
}

.country:hover {
    background-color: #444;
}

.channel-box {
    display: none;
    margin-bottom: 10px;
}

.channel-box.active {
    display: block;
}

.channel {
    padding: 8px;
    margin: 5px 0 5px 15px;
    background-color: #222;
    cursor: pointer;
    border-radius: 6px;
}

.channel:hover {
    background-color: orange;
    color: black;
}

.player {
    width: 70%;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: black;
}

video, iframe {
    width: 95%;
    height: 95%;
}
</style>
</head>

<body>

<header>
    <h1>SHOW TV</h1>
    <input type="text" id="searchInput" placeholder="Buscar canal...">
</header>

<div class="container">
    <div class="channel-list" id="channelList">Cargando canales...</div>
    <div class="player" id="playerContainer">
        <video id="video" controls autoplay></video>
    </div>
</div>

<script>

// 🔥 LISTA GRANDE ORGANIZADA POR PAÍS
const m3uUrl = "https://iptv-org.github.io/iptv/index.country.m3u";

const list = document.getElementById("channelList");
const searchInput = document.getElementById("searchInput");

let channelsByCountry = {};

// 🔹 CANALES EXTRA PARA HISPANOAMÉRICA
const extraChannels = {
    "México": [
        { name: "Azteca Uno (Web)", url: "https://www.tvazteca.com/aztecauno", type: "web" },
        { name: "Las Estrellas (Web)", url: "https://www.lasestrellas.tv/en-vivo", type: "web" },
        { name: "Imagen TV (Web)", url: "https://www.imagentv.com/en-vivo", type: "web" },
        { name: "Multimedios (Web)", url: "https://www.multimedios.com/tv-en-vivo", type: "web" }
    ],
    "Colombia": [
        { name: "Señal Colombia (Web)", url: "https://www.senalcolombia.tv/en-vivo", type: "web" },
        { name: "Canal Institucional (Web)", url: "https://www.canalinstitucional.tv/en-vivo", type: "web" }
    ],
    "Chile": [
        { name: "TVN Chile (Web)", url: "https://www.tvn.cl/tvnplayer/tvn", type: "web" },
        { name: "Canal 13 Chile (Web)", url: "https://www.13.cl/player", type: "web" }
    ],
    "Argentina": [
        { name: "TV Pública (Web)", url: "https://www.tvpublica.com.ar/en-vivo", type: "web" }
    ],
    "Perú": [
        { name: "TV Perú (Web)", url: "https://www.tvperu.gob.pe/en-vivo", type: "web" }
    ],
    "España": [
        { name: "La 1 RTVE (Web)", url: "https://www.rtve.es/directo/la1/", type: "web" },
        { name: "Antena 3 (Web)", url: "https://www.antena3.com/directo/", type: "web" }
    ]
};

async function loadM3U() {
    const res = await fetch(m3uUrl);
    const text = await res.text();
    const lines = text.split("\n");

    channelsByCountry = {};

    for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith("#EXTINF")) {

            const info = lines[i];
            const name = info.split(",")[1]?.trim();
            const url = lines[i + 1]?.trim();

            if (!name || !url) continue;

            const groupMatch = info.match(/group-title="([^"]+)"/);
            const country = groupMatch ? groupMatch[1] : "Otros";

            if (!channelsByCountry[country]) {
                channelsByCountry[country] = [];
            }

            channelsByCountry[country].push({ name, url });
        }
    }

    // 🔹 AGREGAR CANALES EXTRA HISPANOHABLANTES
    Object.keys(extraChannels).forEach(country => {
        if (!channelsByCountry[country]) channelsByCountry[country] = [];
        channelsByCountry[country] = [
            ...extraChannels[country],
            ...channelsByCountry[country]
        ];
    });

    render(channelsByCountry);
}

function render(data) {
    list.innerHTML = "";

    Object.keys(data).forEach(country => {

        const countryDiv = document.createElement("div");
        countryDiv.className = "country";
        countryDiv.textContent = country + " (" + data[country].length + ")";

        const channelBox = document.createElement("div");
        channelBox.className = "channel-box";

        data[country].forEach(ch => {
            const chDiv = document.createElement("div");
            chDiv.className = "channel";
            chDiv.textContent = ch.name;
            chDiv.onclick = () => playStream(ch.url, ch.type || "stream");
            channelBox.appendChild(chDiv);
        });

        countryDiv.onclick = () => {
            channelBox.classList.toggle("active");
        };

        list.appendChild(countryDiv);
        list.appendChild(channelBox);
    });
}

function playStream(url, type = "stream") {

    const container = document.getElementById("playerContainer");

    if (type === "web") {
        container.innerHTML = `
            <iframe src="${url}" 
                width="100%" 
                height="100%" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        `;
        return;
    }

    container.innerHTML = `<video id="video" controls autoplay></video>`;
    const video = document.getElementById("video");

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// 🔹 BUSCADOR
searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase();
    const filtered = {};

    Object.keys(channelsByCountry).forEach(country => {
        const matches = channelsByCountry[country].filter(ch =>
            ch.name.toLowerCase().includes(q)
        );
        if (matches.length > 0) {
            filtered[country] = matches;
        }
    });

    render(filtered);
});

loadM3U();

</script>

</body>
</html>
