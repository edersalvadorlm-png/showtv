<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHOW TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

header {
    background-color: #111;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: orange;
}

.search-box {
    padding: 10px;
    background-color: #1a1a1a;
}

.search-box input {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
}

.container {
    display: flex;
    height: 80vh; /* más simple */
}

.channel-list {
    width: 30%;
    background-color: #1a1a1a;
    overflow-y: auto;
    padding: 10px;
}

.channel {
    padding: 10px;
    margin-bottom: 8px;
    background-color: #222;
    cursor: pointer;
    border-radius: 6px;
}

.channel:hover {
    background-color: orange;
    color: black;
}

.player {
    width: 70%;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: black;
}

video {
    width: 95%;
    height: 95%;
    background: black;
}
</style>
</head>

<body>

<header>SHOW TV</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Buscar canal...">
</div>

<div class="container">
    <div class="channel-list" id="channelList">
        Cargando canales...
    </div>

    <div class="player">
        <video id="video" controls autoplay></video>
    </div>
</div>

<script>
const m3uUrl = "https://raw.githubusercontent.com/edersalvadorlm-png/showtv/main/showtv.m3u";

const list = document.getElementById("channelList");
const searchInput = document.getElementById("searchInput");

let allChannels = [];

async function loadM3U(url) {
    const response = await fetch(url);
    const data = await response.text();
    const lines = data.split("\n");

    for (let i = 0; i < lines.length; i++) {

        if (lines[i].startsWith("#EXTINF")) {

            const name = lines[i].split(",")[1];
            const streamUrl = lines[i + 1]?.trim();

            if (!streamUrl) continue;

            if (streamUrl.endsWith(".m3u")) {
                await loadM3U(streamUrl);
            } 
            else if (streamUrl.startsWith("http")) {

                allChannels.push({ name, url: streamUrl });

                const channel = document.createElement("div");
                channel.className = "channel";
                channel.textContent = name;
                channel.onclick = () => playStream(streamUrl);
                list.appendChild(channel);
            }
        }
    }
}

function renderChannels(channels) {
    list.innerHTML = "";

    channels.forEach(channel => {
        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = channel.name;
        div.onclick = () => playStream(channel.url);
        list.appendChild(div);
    });
}

function playStream(url){
    const video = document.getElementById("video");

    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        video.play();
    } else {
        video.src = url;
        video.play();
    }
}

searchInput.addEventListener("input", function () {
    const text = this.value.toLowerCase();
    const filtered = allChannels.filter(c =>
        c.name.toLowerCase().includes(text)
    );
    renderChannels(filtered);
});

loadM3U(m3uUrl);
</script>

</body>
</html>
