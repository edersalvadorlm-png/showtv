<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOW TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222;
    --border: rgba(255,255,255,0.08);
    --accent: #ff6600;
    --accent2: #ff8c00;
    --text: #f1f1f1;
    --muted: #aaa;
    --hover: rgba(255,255,255,0.06);
    --radius: 10px;
    --sidebar: 300px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    height: 60px;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 18px; height: 18px; fill: white; }

  .search-wrap {
    flex: 1;
    max-width: 520px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    fill: var(--muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 9px 16px 9px 38px;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }

  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--muted); }

  .menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: none;
    flex-direction: column;
    gap: 5px;
    margin-left: auto;
  }

  .menu-btn span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: 0.3s;
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    height: calc(100vh - 60px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar);
    min-width: var(--sidebar);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-header {
    padding: 14px 16px 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
  }

  /* Country group */
  .country-group { border-bottom: 1px solid var(--border); }

  .country-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 16px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-align: left;
    transition: background 0.15s;
    gap: 8px;
  }

  .country-btn:hover { background: var(--hover); }

  .country-btn .flag { font-size: 18px; line-height: 1; }

  .country-btn .name { flex: 1; }

  .country-btn .count {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 400;
  }

  .country-btn .arrow {
    width: 14px;
    height: 14px;
    fill: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .country-btn.open .arrow { transform: rotate(180deg); }

  .channels-list {
    display: none;
    background: var(--bg);
  }

  .channels-list.open { display: block; }

  .channel-item {
    padding: 9px 16px 9px 44px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    border-left: 2px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .channel-item:hover { background: var(--hover); color: var(--text); }

  .channel-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(255,102,0,0.07);
  }

  .channel-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .channel-item.active .channel-dot { background: var(--accent); }

  /* ── PLAYER AREA ── */
  .player-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
    overflow: hidden;
  }

  .player-wrap {
    flex: 1;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  #video, .player-iframe {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    height: 100%;
    text-align: center;
    padding: 24px;
  }

  .empty-state .big-icon {
    width: 64px;
    height: 64px;
    background: var(--surface);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-state .big-icon svg { width: 30px; height: 30px; fill: var(--muted); }

  .empty-state h2 {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
  }

  .empty-state p { font-size: 14px; max-width: 260px; line-height: 1.6; }

  /* Now playing bar */
  .now-playing {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: none;
    align-items: center;
    gap: 12px;
  }

  .now-playing.visible { display: flex; }

  .now-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .now-playing .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .now-playing .channel-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  /* Loading spinner */
  .loading-wrap {
    padding: 32px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error/empty search */
  .no-results {
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    .menu-btn { display: flex; }

    .sidebar {
      position: fixed;
      left: 0;
      top: 60px;
      height: calc(100vh - 60px);
      z-index: 200;
      transform: translateX(-100%);
      width: 85vw;
      min-width: 0;
      box-shadow: 4px 0 24px rgba(0,0,0,0.5);
    }

    .sidebar.open { transform: translateX(0); }

    .overlay {
      display: none;
      position: fixed;
      inset: 60px 0 0 0;
      background: rgba(0,0,0,0.6);
      z-index: 199;
    }

    .overlay.visible { display: block; }

    .player-area { width: 100%; }

    .search-wrap { max-width: none; }

    .logo span { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <span>SHOW TV</span>
  </a>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar canal o país...">
  </div>
  <button class="menu-btn" id="menuBtn" aria-label="Menú">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="overlay" id="overlay"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">Canales</div>
    <div id="channelList">
      <div class="loading-wrap">
        <div class="spinner"></div>
        Cargando canales...
      </div>
    </div>
  </aside>

  <!-- PLAYER -->
  <main class="player-area">
    <div class="player-wrap" id="playerContainer">
      <div class="empty-state">
        <div class="big-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <h2>Selecciona un canal</h2>
        <p>Elige un canal de la lista para comenzar a ver en vivo.</p>
      </div>
    </div>
    <div class="now-playing" id="nowPlaying">
      <div class="now-dot"></div>
      <span class="label">En vivo</span>
      <span class="channel-name" id="nowName">—</span>
    </div>
  </main>
</div>

<script>
const m3uUrl = "https://iptv-org.github.io/iptv/index.country.m3u";
const list = document.getElementById("channelList");
const searchInput = document.getElementById("searchInput");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");

let channelsByCountry = {};
let activeItem = null;

// Mobile menu
menuBtn.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  overlay.classList.toggle("visible");
});
overlay.addEventListener("click", closeSidebar);
function closeSidebar() {
  sidebar.classList.remove("open");
  overlay.classList.remove("visible");
}

// Country flags mapping (top countries)
const flags = {
  "Mexico": "🇲🇽", "México": "🇲🇽",
  "United States": "🇺🇸", "Colombia": "🇨🇴",
  "Argentina": "🇦🇷", "Chile": "🇨🇱",
  "Spain": "🇪🇸", "España": "🇪🇸",
  "Brazil": "🇧🇷", "Peru": "🇵🇪", "Perú": "🇵🇪",
  "Venezuela": "🇻🇪", "Ecuador": "🇪🇨",
  "Bolivia": "🇧🇴", "Paraguay": "🇵🇾",
  "Uruguay": "🇺🇾", "Cuba": "🇨🇺",
  "Dominican Republic": "🇩🇴", "Honduras": "🇭🇳",
  "Guatemala": "🇬🇹", "El Salvador": "🇸🇻",
  "Costa Rica": "🇨🇷", "Panama": "🇵🇦",
  "Nicaragua": "🇳🇮", "Puerto Rico": "🇵🇷",
  "France": "🇫🇷", "Germany": "🇩🇪",
  "Italy": "🇮🇹", "Portugal": "🇵🇹",
  "United Kingdom": "🇬🇧", "Canada": "🇨🇦",
  "Japan": "🇯🇵", "China": "🇨🇳",
  "Russia": "🇷🇺", "India": "🇮🇳",
  "Australia": "🇦🇺", "Netherlands": "🇳🇱",
  "Turkey": "🇹🇷", "Poland": "🇵🇱",
  "Otros": "🌍", "Other": "🌍"
};

const extraChannels = {
  "México": [
    { name: "Azteca Uno (Web)", url: "https://www.tvazteca.com/aztecauno", type: "web" },
    { name: "Las Estrellas (Web)", url: "https://www.lasestrellas.tv/en-vivo", type: "web" },
    { name: "Imagen TV (Web)", url: "https://www.imagentv.com/en-vivo", type: "web" },
    { name: "Multimedios (Web)", url: "https://www.multimedios.com/tv-en-vivo", type: "web" }
  ],
  "Colombia": [
    { name: "Señal Colombia (Web)", url: "https://www.senalcolombia.tv/en-vivo", type: "web" },
    { name: "Canal Institucional (Web)", url: "https://www.canalinstitucional.tv/en-vivo", type: "web" }
  ],
  "Chile": [
    { name: "TVN Chile (Web)", url: "https://www.tvn.cl/tvnplayer/tvn", type: "web" },
    { name: "Canal 13 Chile (Web)", url: "https://www.13.cl/player", type: "web" }
  ],
  "Argentina": [
    { name: "TV Pública (Web)", url: "https://www.tvpublica.com.ar/en-vivo", type: "web" }
  ],
  "Perú": [
    { name: "TV Perú (Web)", url: "https://www.tvperu.gob.pe/en-vivo", type: "web" }
  ],
  "España": [
    { name: "La 1 RTVE (Web)", url: "https://www.rtve.es/directo/la1/", type: "web" },
    { name: "Antena 3 (Web)", url: "https://www.antena3.com/directo/", type: "web" }
  ]
};

async function loadM3U() {
  try {
    const res = await fetch(m3uUrl);
    const text = await res.text();
    const lines = text.split("\n");
    channelsByCountry = {};

    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith("#EXTINF")) {
        const info = lines[i];
        const name = info.split(",")[1]?.trim();
        const url = lines[i + 1]?.trim();
        if (!name || !url) continue;
        const groupMatch = info.match(/group-title="([^"]+)"/);
        const country = groupMatch ? groupMatch[1] : "Otros";
        if (!channelsByCountry[country]) channelsByCountry[country] = [];
        channelsByCountry[country].push({ name, url });
      }
    }

    Object.keys(extraChannels).forEach(country => {
      if (!channelsByCountry[country]) channelsByCountry[country] = [];
      channelsByCountry[country] = [...extraChannels[country], ...channelsByCountry[country]];
    });

    render(channelsByCountry);
  } catch (e) {
    list.innerHTML = '<div class="no-results">Error cargando canales.<br>Intenta recargar la página.</div>';
  }
}

function getFlag(country) {
  return flags[country] || "📺";
}

function render(data) {
  list.innerHTML = "";
  const keys = Object.keys(data);

  if (keys.length === 0) {
    list.innerHTML = '<div class="no-results">No se encontraron canales.</div>';
    return;
  }

  keys.forEach(country => {
    const group = document.createElement("div");
    group.className = "country-group";

    const btn = document.createElement("button");
    btn.className = "country-btn";
    btn.innerHTML = `
      <span class="flag">${getFlag(country)}</span>
      <span class="name">${country}</span>
      <span class="count">${data[country].length}</span>
      <svg class="arrow" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    `;

    const chList = document.createElement("div");
    chList.className = "channels-list";

    data[country].forEach(ch => {
      const item = document.createElement("div");
      item.className = "channel-item";
      item.innerHTML = `<div class="channel-dot"></div><span>${ch.name}</span>`;
      item.onclick = () => {
        playStream(ch.url, ch.type || "stream", ch.name, item);
        if (window.innerWidth <= 680) closeSidebar();
      };
      chList.appendChild(item);
    });

    btn.onclick = () => {
      const isOpen = chList.classList.contains("open");
      // Close all others
      document.querySelectorAll(".channels-list.open").forEach(el => el.classList.remove("open"));
      document.querySelectorAll(".country-btn.open").forEach(el => el.classList.remove("open"));
      if (!isOpen) {
        chList.classList.add("open");
        btn.classList.add("open");
      }
    };

    group.appendChild(btn);
    group.appendChild(chList);
    list.appendChild(group);
  });
}

function playStream(url, type, name, itemEl) {
  if (activeItem) activeItem.classList.remove("active");
  activeItem = itemEl;
  itemEl.classList.add("active");

  document.getElementById("nowName").textContent = name;
  document.getElementById("nowPlaying").classList.add("visible");

  const container = document.getElementById("playerContainer");

  if (type === "web") {
    container.innerHTML = `<iframe class="player-iframe" src="${url}" frameborder="0" allowfullscreen></iframe>`;
    return;
  }

  container.innerHTML = `<video id="video" controls autoplay playsinline></video>`;
  const video = document.getElementById("video");

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
    video.play().catch(() => {});
  } else {
    video.src = url;
  }
}

searchInput.addEventListener("input", () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { render(channelsByCountry); return; }
  const filtered = {};
  Object.keys(channelsByCountry).forEach(country => {
    const matches = channelsByCountry[country].filter(ch =>
      ch.name.toLowerCase().includes(q) || country.toLowerCase().includes(q)
    );
    if (matches.length > 0) filtered[country] = matches;
  });
  render(filtered);
  // Auto-open all results when searching
  document.querySelectorAll(".channels-list").forEach(el => el.classList.add("open"));
  document.querySelectorAll(".country-btn").forEach(el => el.classList.add("open"));
});

loadM3U();
</script>
</body>
</html>
