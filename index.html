<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHOW TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: white;
}

header {
    background-color: #111;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: orange;
}

.search-box {
    padding: 10px;
    background: #1a1a1a;
}

.search-box input {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
}

.container {
    display: flex;
    height: calc(100vh - 120px);
}

.channel-list {
    width: 30%;
    background-color: #1a1a1a;
    overflow-y: auto;
    padding: 10px;
}

.channel {
    display: flex;
    align-items: center;
    padding: 8px;
    margin-bottom: 6px;
    background-color: #222;
    cursor: pointer;
    border-radius: 6px;
}

.channel img {
    width: 40px;
    height: 40px;
    margin-right: 10px;
    border-radius: 6px;
}

.channel:hover {
    background-color: orange;
    color: black;
}

.player {
    width: 70%;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: black;
}

video {
    width: 95%;
    height: 95%;
    background: black;
}

@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }
    .channel-list {
        width: 100%;
        height: 40%;
    }
    .player {
        width: 100%;
        height: 60%;
    }
}
</style>
</head>

<body>

<header>SHOW TV</header>

<div class="search-box">
    <input type="text" id="search" placeholder="Buscar canal...">
</div>

<div class="container">
    <div class="channel-list" id="channelList">
        Cargando canales...
    </div>

    <div class="player">
        <video id="video" controls autoplay></video>
    </div>
</div>

<script>
const m3uUrl = "https://raw.githubusercontent.com/edersalvadorlm-png/showtv/main/showtv.m3u";

const list = document.getElementById("channelList");
const searchInput = document.getElementById("search");
let allChannels = [];
let hls;

async function loadM3U(url) {
    const response = await fetch(url);
    const data = await response.text();
    const lines = data.split("\n");

    for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith("#EXTINF")) {

            const info = lines[i];
            const name = info.split(",")[1];

            const logoMatch = info.match(/tvg-logo="(.*?)"/);
            const logo = logoMatch ? logoMatch[1] : "";

            const groupMatch = info.match(/group-title="(.*?)"/);
            const group = groupMatch ? groupMatch[1] : "Otros";

            const streamUrl = lines[i + 1]?.trim();
            if (!streamUrl || !streamUrl.startsWith("http")) continue;

            allChannels.push({ name, logo, group, streamUrl });
        }
    }

    renderChannels(allChannels);
}

function renderChannels(channels){
    list.innerHTML = "";
    channels.forEach(channel => {
        const div = document.createElement("div");
        div.className = "channel";
        div.onclick = () => playStream(channel.streamUrl);

        div.innerHTML = `
            ${channel.logo ? `<img src="${channel.logo}" onerror="this.style.display='none'">` : ""}
            <span>${channel.name}</span>
        `;

        list.appendChild(div);
    });
}

function playStream(url){
    const video = document.getElementById("video");

    if (hls) {
        hls.destroy();
    }

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });
    } else {
        video.src = url;
        video.play();
    }
}

searchInput.addEventListener("input", function(){
    const value = this.value.toLowerCase();
    const filtered = allChannels.filter(c => c.name.toLowerCase().includes(value));
    renderChannels(filtered);
});

loadM3U(m3uUrl);
</script>

</body>
</html>
