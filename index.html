<script>
const m3uUrl = "https://raw.githubusercontent.com/edersalvadorlm-png/showtv/main/showtv.m3u";

const list = document.getElementById("channelList");
const searchInput = document.getElementById("searchInput");

let allChannels = [];

async function loadM3U(url) {
    try {
        const response = await fetch(url);
        const data = await response.text();
        const lines = data.split("\n");

        for (let i = 0; i < lines.length; i++) {

            if (lines[i].startsWith("#EXTINF")) {

                const name = lines[i].split(",")[1];
                const streamUrl = lines[i + 1]?.trim();

                if (!streamUrl) continue;

                if (streamUrl.endsWith(".m3u")) {
                    await loadM3U(streamUrl);
                } 
                else if (streamUrl.startsWith("http")) {
                    allChannels.push({ name, url: streamUrl });
                }
            }
        }

        renderChannels(allChannels);

    } catch (error) {
        console.error("Error cargando:", url);
    }
}

function renderChannels(channels) {
    list.innerHTML = "";

    channels.forEach(channel => {
        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = channel.name;
        div.onclick = () => playStream(channel.url);
        list.appendChild(div);
    });
}

function playStream(url) {
    const video = document.getElementById("video");

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        video.play();
    } else {
        video.src = url;
        video.play();
    }
}

searchInput.addEventListener("input", function () {
    const searchText = this.value.toLowerCase();

    const filtered = allChannels.filter(channel =>
        channel.name.toLowerCase().includes(searchText)
    );

    renderChannels(filtered);
});

loadM3U(m3uUrl);
</script>
